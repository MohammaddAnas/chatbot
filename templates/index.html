<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Chatbot</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <div class="chat-header">

            <h1>🤖 AI Chatbot</h1>

        </div>

        <div class="chat-box" id="chat-box">

            {% if history %}

                {% for chat in history %}

                    <div class="message user">

                        <strong>You</strong>

                        <p>{{ chat.user }}</p>

                    </div>

                    <div class="message bot">

                        <strong>AI</strong>

                        <p>{{ chat.bot }}</p>

                    </div>

                {% endfor %}

            {% else %}

                <div class="welcome">

                    <h2>Welcome 👋</h2>

                    <p>
                        Ask me anything, and I'll do my best to help you.
                    </p>

                </div>

            {% endif %}

        </div>

        <form method="POST">

            <textarea
                name="message"
                placeholder="Type your message here..."
                required></textarea>

            <div class="button-group">

                <button type="submit">

                    Send

                </button>

                <a href="{{ url_for('clear_chat') }}">

                    <button
                        type="button"
                        class="clear-btn">

                        Clear Chat

                    </button>

                </a>

            </div>

        </form>

    </div>

    <script>

        const chatBox = document.getElementById("chat-box");

        chatBox.scrollTop = chatBox.scrollHeight;

    </script>

</body>

</html>
